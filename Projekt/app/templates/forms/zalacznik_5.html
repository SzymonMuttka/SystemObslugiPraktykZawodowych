{% extends 'base.html' %}

{% block title %}Załącznik 5 — Kwestionariusz ankiety{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-header">
        <h2>Załącznik 5: Kwestionariusz ankiety</h2>
        <p>Formularz badania satysfakcji praktyki wypełniany przez studenta.</p>
    </div>

    <form method="post" class="document-form">
        <fieldset class="form-section">
            <legend>Dane studenta (prefilled)</legend>

            <div class="form-group">
                <label>Rok akademicki</label>
                <input type="text" value="{{ rok_akademicki }}" readonly>
            </div>

            <div class="form-group">
                <label>Kierunek studiów</label>
                <input type="text" value="{{ kierunek }}" readonly>
            </div>

            <div class="form-group">
                <label>Forma studiów</label>
                <input type="text" value="{{ forma_studiow }}" readonly>
            </div>

            <div class="form-group">
                <label>Semestr</label>
                <input type="text" value="{{ semestr }}" readonly>
            </div>

            <div class="form-group">
                <label>Liczba godzin praktyki zawodowej</label>
                <input type="text" value="{{ ilosc_godzin_praktyki }}" readonly>
            </div>
        </fieldset>

        <fieldset class="form-section">
            <legend>Wypełniane przez studenta</legend>

            <div class="form-group">
                <label for="odpowiedz">Ocena praktyki</label>
                <select id="odpowiedz" name="odpowiedz"
                    {% if role != 'student' %}disabled{% endif %}>
                    <option value="">Wybierz</option>
                    <option value="tak" {% if odpowiedz == 'tak' %}selected{% endif %}>Tak</option>
                    <option value="raczej tak" {% if odpowiedz == 'raczej tak' %}selected{% endif %}>Raczej tak</option>
                    <option value="trudno powiedziec" {% if odpowiedz == 'trudno powiedziec' %}selected{% endif %}>Trudno powiedzieć</option>
                    <option value="raczej nie" {% if odpowiedz == 'raczej nie' %}selected{% endif %}>Raczej nie</option>
                    <option value="nie" {% if odpowiedz == 'nie' %}selected{% endif %}>Nie</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dodatkowe_uwagi">Dodatkowe uwagi</label>
                <textarea id="dodatkowe_uwagi" name="dodatkowe_uwagi" rows="4"
                    {% if role != 'student' %}readonly{% endif %}>{{ dodatkowe_uwagi }}</textarea>
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Zapisz załącznik 5</button>
            <a href="{{ url_for('dashboard.index') }}" class="btn-secondary">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
