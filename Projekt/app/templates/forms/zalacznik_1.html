{% extends 'base.html' %}

{% block title %}Załącznik 1 — Porozumienie z zakładem pracy{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-header">
        <h2>Załącznik 1: Porozumienie z zakładem pracy</h2>
        <p>Ten formularz może wypełniać tylko dziekanat.</p>
    </div>

    <form method="post" class="document-form">
        <fieldset class="form-section">
            <legend>Dane porozumienia</legend>

            <div class="form-group">
                <label for="nr_porozumienia">Numer porozumienia</label>
                <input id="nr_porozumienia" name="nr_porozumienia" type="text"
                    value="{{ nr_porozumienia }}" readonly>
            </div>

            <div class="form-group">
                <label for="data_zawarcia">Data zawarcia porozumienia</label>
                <input id="data_zawarcia" name="data_zawarcia" type="date"
                    value="{{ data_zawarcia }}" readonly>
            </div>
        </fieldset>

        <fieldset class="form-section">
            <legend>Dane wypełniane przez dziekanat</legend>

            <div class="form-group">
                <label for="nazwa_zakladu_pracy">Nazwa zakładu pracy</label>
                <input id="nazwa_zakladu_pracy" name="nazwa_zakladu_pracy" type="text" required>
            </div>

            <div class="form-group">
                <label for="reprezentant_uczelni">Reprezentant uczelni</label>
                <input id="reprezentant_uczelni" name="reprezentant_uczelni" type="text" required>
            </div>

            <div class="form-group">
                <label for="reprezentant_firmy">Reprezentant firmy</label>
                <input id="reprezentant_firmy" name="reprezentant_firmy" type="text" required>
            </div>

            <div class="form-group">
                <label for="imie_nazwisko_studenta">Imię i nazwisko studenta</label>
                <input id="imie_nazwisko_studenta" name="imie_nazwisko_studenta" type="text" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="termin_od">Termin praktyki - od</label>
                    <input id="termin_od" name="termin_od" type="date" required>
                </div>
                <div class="form-group">
                    <label for="termin_do">Termin praktyki - do</label>
                    <input id="termin_do" name="termin_do" type="date" required>
                </div>
            </div>

            <div class="form-group">
                <label for="wymiar_praktyki">Wymiar praktyki zawodowej</label>
                <input id="wymiar_praktyki" name="wymiar_praktyki" type="text" required>
            </div>
        </fieldset>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Zapisz załącznik 1</button>
            <a href="{{ url_for('dashboard.index') }}" class="btn-secondary">Anuluj</a>
        </div>
    </form>
</div>
{% endblock %}
